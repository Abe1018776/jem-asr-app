<!DOCTYPE html>
<html lang="yi" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JEM Yiddish ASR Workbench</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">JEM ASR Workbench</h1>
    <div class="toolbar">
      <button id="btn-export-state" class="toolbar-btn" title="Export State (JSON)">Export State</button>
      <button id="btn-import-state" class="toolbar-btn" title="Import State (JSON)">Import State</button>
      <input type="file" id="import-file-input" accept=".json" hidden />
      <button id="btn-export-csv" class="toolbar-btn" title="Export Approved as CSV">Export CSV</button>
    </div>
  </header>

  <nav class="filter-bar">
    <div class="filter-pills">
      <button class="filter-pill active" data-filter="fifty">All <span class="badge" id="count-fifty">0</span></button>
      <button class="filter-pill" data-filter="fifty-unmapped">Unmapped <span class="badge" id="count-fifty-unmapped">0</span></button>
      <button class="filter-pill" data-filter="fifty-mapped">Mapped <span class="badge" id="count-fifty-mapped">0</span></button>
      <button class="filter-pill" data-filter="fifty-cleaned">Cleaned <span class="badge" id="count-fifty-cleaned">0</span></button>
      <button class="filter-pill" data-filter="fifty-aligned">Aligned <span class="badge" id="count-fifty-aligned">0</span></button>
      <button class="filter-pill" data-filter="fifty-approved">Approved <span class="badge" id="count-fifty-approved">0</span></button>
    </div>
    <div class="filter-controls">
      <select id="filter-year" class="filter-select"><option value="">All Years</option></select>
      <select id="filter-month" class="filter-select"><option value="">All Months</option></select>
      <select id="filter-type" class="filter-select"><option value="">All Types</option></select>
      <input type="text" id="search-input" class="search-input" placeholder="Search..." />
    </div>
  </nav>

  <main class="table-container" id="table-container">
    <!-- Table rendered by src/table.js -->
  </main>

  <footer class="bulk-action-bar" id="bulk-action-bar">
    <span class="bulk-selection-count" id="bulk-selection-count">0 selected</span>
    <button class="bulk-btn" id="btn-clean-selected">Clean Selected</button>
    <button class="bulk-btn" id="btn-align-selected">Align Selected</button>
    <button class="bulk-btn bulk-btn-approve" id="btn-approve-selected">Approve Selected</button>
  </footer>

  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      <div class="modal-content" id="modal-content">
        <!-- Search modal, karaoke player, or benchmark config injected here -->
      </div>
    </div>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
